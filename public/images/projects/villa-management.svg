<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg-vm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#160f00"/>
    </linearGradient>
    <linearGradient id="accent-vm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="bar-vm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="glow-vm" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg-vm)"/>

  <!-- Ornamental circles -->
  <g stroke="rgba(252,211,77,0.05)" stroke-width="1" fill="none">
    <circle cx="80" cy="80" r="45"/>
    <circle cx="80" cy="80" r="30"/>
    <circle cx="720" cy="80" r="45"/>
    <circle cx="720" cy="80" r="30"/>
    <circle cx="80" cy="360" r="35"/>
    <circle cx="720" cy="360" r="35"/>
  </g>

  <ellipse cx="400" cy="210" rx="280" ry="160" fill="url(#glow-vm)"/>

  <!-- Left card: Reservasi -->
  <rect x="72" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(217,119,6,0.25)" stroke-width="1"/>
  <text x="146" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">RESERVASI</text>
  <text x="146" y="208" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700"
        fill="url(#accent-vm)" text-anchor="middle">Zero Overbooking</text>
  <!-- Check badges -->
  <g transform="translate(96, 220)">
    <rect x="0" y="0" width="100" height="18" rx="9" fill="rgba(217,119,6,0.15)" stroke="rgba(252,211,77,0.25)" stroke-width="1"/>
    <text x="50" y="13" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(252,211,77,0.85)" text-anchor="middle">✓ Real-time slot</text>
  </g>
  <g transform="translate(96, 244)">
    <rect x="0" y="0" width="100" height="18" rx="9" fill="rgba(217,119,6,0.15)" stroke="rgba(252,211,77,0.25)" stroke-width="1"/>
    <text x="50" y="13" font-family="Inter, system-ui, sans-serif" font-size="8.5" fill="rgba(252,211,77,0.85)" text-anchor="middle">✓ Booking terpusat</text>
  </g>

  <!-- Right card: Ocupancy / Laporan -->
  <rect x="580" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(217,119,6,0.25)" stroke-width="1"/>
  <text x="654" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">LAPORAN OTOMATIS</text>
  <!-- Bar chart for occupancy -->
  <rect x="600" y="238" width="18" height="30" rx="3" fill="rgba(217,119,6,0.3)"/>
  <rect x="622" y="222" width="18" height="46" rx="3" fill="rgba(217,119,6,0.45)"/>
  <rect x="644" y="210" width="18" height="58" rx="3" fill="rgba(217,119,6,0.6)"/>
  <rect x="666" y="200" width="18" height="68" rx="3" fill="url(#bar-vm)"/>
  <line x1="596" y1="270" x2="700" y2="270" stroke="rgba(252,211,77,0.15)" stroke-width="1"/>
  <text x="654" y="283" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(252,211,77,0.7)" text-anchor="middle">PDF/Excel export</text>

  <!-- Central card -->
  <rect x="222" y="110" width="356" height="218" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(217,119,6,0.3)" stroke-width="1"/>

  <!-- Hotel building icon -->
  <g transform="translate(372, 130)">
    <!-- Building body -->
    <rect x="4" y="20" width="48" height="38" rx="2" fill="rgba(217,119,6,0.3)" stroke="rgba(252,211,77,0.55)" stroke-width="1.5"/>
    <!-- Roof -->
    <polygon points="0,22 28,6 56,22" fill="rgba(217,119,6,0.5)" stroke="rgba(252,211,77,0.6)" stroke-width="1.5"/>
    <!-- Windows -->
    <rect x="10" y="26" width="10" height="10" rx="2" fill="rgba(252,211,77,0.5)"/>
    <rect x="24" y="26" width="10" height="10" rx="2" fill="rgba(252,211,77,0.35)"/>
    <rect x="38" y="26" width="10" height="10" rx="2" fill="rgba(252,211,77,0.5)"/>
    <!-- Door -->
    <rect x="20" y="40" width="16" height="18" rx="2" fill="rgba(217,119,6,0.6)"/>
  </g>

  <text x="400" y="222" font-family="Inter, system-ui, sans-serif" font-size="16"
        font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle">VHD Management App</text>
  <text x="400" y="245" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(252,211,77,0.82)" text-anchor="middle" letter-spacing="2">PMS · RESERVASI · DASHBOARD</text>

  <!-- Tech badges -->
  <g transform="translate(258, 274)">
    <rect x="0" y="0" width="48" height="20" rx="10" fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
    <text x="24" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(252,211,77,0.95)" text-anchor="middle">Laravel</text>
    <rect x="56" y="0" width="42" height="20" rx="10" fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
    <text x="77" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(252,211,77,0.95)" text-anchor="middle">MySQL</text>
    <rect x="106" y="0" width="76" height="20" rx="10" fill="rgba(217,119,6,0.15)" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
    <text x="144" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(252,211,77,0.95)" text-anchor="middle">TailwindCSS</text>
  </g>

  <text x="400" y="420" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">Agung Dwi Sahputra · Portfolio</text>
</svg>
