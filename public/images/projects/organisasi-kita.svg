<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg-ok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030f0f"/>
      <stop offset="100%" stop-color="#071a1a"/>
    </linearGradient>
    <linearGradient id="accent-ok" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar-ok" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="glow-ok" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg-ok)"/>

  <!-- Grid lines -->
  <g stroke="rgba(45,212,191,0.05)" stroke-width="1">
    <line x1="0" y1="110" x2="800" y2="110"/>
    <line x1="0" y1="330" x2="800" y2="330"/>
    <line x1="110" y1="0" x2="110" y2="440"/>
    <line x1="690" y1="0" x2="690" y2="440"/>
  </g>

  <ellipse cx="400" cy="210" rx="280" ry="160" fill="url(#glow-ok)"/>

  <!-- Left card: Anggota -->
  <rect x="72" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(13,148,136,0.25)" stroke-width="1"/>
  <text x="146" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">MANAJEMEN ANGGOTA</text>
  <text x="146" y="213" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800"
        fill="url(#accent-ok)" text-anchor="middle">100%</text>
  <rect x="92" y="226" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="92" y="226" width="108" height="5" rx="2.5" fill="url(#bar-ok)"/>
  <text x="146" y="250" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(45,212,191,0.7)" text-anchor="middle">Terpusat &amp; Digital</text>
  <text x="146" y="266" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">Data keanggotaan</text>

  <!-- Right card: Acara & Event -->
  <rect x="580" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(13,148,136,0.25)" stroke-width="1"/>
  <text x="654" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">MANAJEMEN ACARA</text>
  <!-- Calendar icon simplified -->
  <rect x="624" y="190" width="60" height="50" rx="6" fill="rgba(13,148,136,0.2)" stroke="rgba(45,212,191,0.4)" stroke-width="1.5"/>
  <rect x="624" y="190" width="60" height="14" rx="6" fill="rgba(13,148,136,0.5)"/>
  <line x1="636" y1="185" x2="636" y2="195" stroke="rgba(45,212,191,0.8)" stroke-width="2" stroke-linecap="round"/>
  <line x1="672" y1="185" x2="672" y2="195" stroke="rgba(45,212,191,0.8)" stroke-width="2" stroke-linecap="round"/>
  <!-- Calendar dots -->
  <circle cx="638" cy="215" r="3" fill="rgba(45,212,191,0.6)"/>
  <circle cx="654" cy="215" r="3" fill="rgba(45,212,191,0.85)"/>
  <circle cx="670" cy="215" r="3" fill="rgba(45,212,191,0.6)"/>
  <circle cx="638" cy="228" r="3" fill="rgba(45,212,191,0.4)"/>
  <circle cx="654" cy="228" r="3" fill="rgba(45,212,191,0.6)"/>
  <text x="654" y="262" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(45,212,191,0.7)" text-anchor="middle">Pendaftaran &amp; Rekrutmen</text>

  <!-- Central card -->
  <rect x="222" y="110" width="356" height="218" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(13,148,136,0.3)" stroke-width="1"/>

  <!-- People / org icon -->
  <g transform="translate(375, 133)">
    <!-- Top person -->
    <circle cx="24" cy="10" r="8" fill="rgba(13,148,136,0.5)" stroke="rgba(45,212,191,0.7)" stroke-width="1.5"/>
    <!-- Left person -->
    <circle cx="10" cy="36" r="7" fill="rgba(13,148,136,0.4)" stroke="rgba(45,212,191,0.5)" stroke-width="1.5"/>
    <!-- Right person -->
    <circle cx="38" cy="36" r="7" fill="rgba(13,148,136,0.4)" stroke="rgba(45,212,191,0.5)" stroke-width="1.5"/>
    <!-- Connecting lines -->
    <line x1="24" y1="18" x2="24" y2="26" stroke="rgba(45,212,191,0.5)" stroke-width="1.5"/>
    <line x1="24" y1="26" x2="10" y2="30" stroke="rgba(45,212,191,0.5)" stroke-width="1.5"/>
    <line x1="24" y1="26" x2="38" y2="30" stroke="rgba(45,212,191,0.5)" stroke-width="1.5"/>
    <circle cx="24" cy="26" r="2.5" fill="rgba(45,212,191,0.6)"/>
  </g>

  <text x="400" y="222" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle">Organisasi Kita</text>
  <text x="400" y="245" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(45,212,191,0.82)" text-anchor="middle" letter-spacing="2">INFORMATION SYSTEM · MEMBER MANAGEMENT</text>

  <!-- Tech badges -->
  <g transform="translate(245, 274)">
    <rect x="0" y="0" width="62" height="20" rx="10" fill="rgba(13,148,136,0.15)" stroke="rgba(13,148,136,0.35)" stroke-width="1"/>
    <text x="31" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(45,212,191,0.95)" text-anchor="middle">PHP Native</text>
    <rect x="70" y="0" width="42" height="20" rx="10" fill="rgba(13,148,136,0.15)" stroke="rgba(13,148,136,0.35)" stroke-width="1"/>
    <text x="91" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(45,212,191,0.95)" text-anchor="middle">MySQL</text>
    <rect x="120" y="0" width="76" height="20" rx="10" fill="rgba(13,148,136,0.15)" stroke="rgba(13,148,136,0.35)" stroke-width="1"/>
    <text x="158" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(45,212,191,0.95)" text-anchor="middle">TailwindCSS</text>
  </g>

  <text x="400" y="420" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">Agung Dwi Sahputra · Portfolio</text>
</svg>
