<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg-pa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0c1124"/>
    </linearGradient>
    <linearGradient id="accent-pa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar-pa" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow-pa" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg-pa)"/>

  <!-- Dot grid pattern -->
  <g fill="rgba(99,102,241,0.07)">
    <circle cx="50" cy="50" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="150" cy="50" r="1.5"/>
    <circle cx="650" cy="50" r="1.5"/><circle cx="700" cy="50" r="1.5"/><circle cx="750" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/><circle cx="100" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/><circle cx="750" cy="100" r="1.5"/>
    <circle cx="50" cy="380" r="1.5"/><circle cx="100" cy="380" r="1.5"/><circle cx="150" cy="380" r="1.5"/>
    <circle cx="650" cy="380" r="1.5"/><circle cx="700" cy="380" r="1.5"/><circle cx="750" cy="380" r="1.5"/>
    <circle cx="50" cy="340" r="1.5"/><circle cx="100" cy="340" r="1.5"/>
    <circle cx="700" cy="340" r="1.5"/><circle cx="750" cy="340" r="1.5"/>
  </g>

  <ellipse cx="400" cy="210" rx="280" ry="160" fill="url(#glow-pa)"/>

  <!-- Left card: Digitalisasi -->
  <rect x="72" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(59,130,246,0.22)" stroke-width="1"/>
  <text x="146" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">DIGITALISASI</text>
  <text x="146" y="213" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800"
        fill="url(#accent-pa)" text-anchor="middle">100%</text>
  <rect x="92" y="226" width="108" height="5" rx="2.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="92" y="226" width="108" height="5" rx="2.5" fill="url(#bar-pa)"/>
  <text x="146" y="250" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(96,165,250,0.7)" text-anchor="middle">Manual → Digital</text>
  <text x="146" y="266" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">Proses evaluasi</text>

  <!-- Right card: Real-time -->
  <rect x="580" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(59,130,246,0.22)" stroke-width="1"/>
  <text x="654" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">REAL-TIME TRACKING</text>
  <circle cx="654" cy="210" r="28" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <circle cx="654" cy="210" r="20" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <circle cx="654" cy="210" r="12" fill="rgba(59,130,246,0.3)"/>
  <circle cx="654" cy="210" r="5" fill="rgba(96,165,250,0.9)"/>
  <text x="654" y="256" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(96,165,250,0.7)" text-anchor="middle">Monitoring Progres</text>
  <text x="654" y="271" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">Peserta &amp; Asesor</text>

  <!-- Central card -->
  <rect x="222" y="110" width="356" height="218" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>

  <!-- Clipboard icon -->
  <g transform="translate(379, 135)">
    <rect x="0" y="8" width="40" height="48" rx="5" fill="rgba(59,130,246,0.25)" stroke="rgba(96,165,250,0.55)" stroke-width="1.5"/>
    <rect x="12" y="3" width="16" height="10" rx="4" fill="rgba(96,165,250,0.85)"/>
    <rect x="7" y="26" width="26" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
    <rect x="7" y="34" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
    <path d="M8 45 L14 51 L30 38" stroke="rgba(96,165,250,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="400" y="222" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle">Assessment PTC</text>
  <text x="400" y="245" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(96,165,250,0.82)" text-anchor="middle" letter-spacing="2">ENTERPRISE · ROLE-BASED · ANALYTICS</text>

  <!-- Tech badges -->
  <g transform="translate(258, 274)">
    <rect x="0" y="0" width="48" height="20" rx="10" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
    <text x="24" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(96,165,250,0.95)" text-anchor="middle">Laravel</text>
    <rect x="56" y="0" width="42" height="20" rx="10" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
    <text x="77" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(96,165,250,0.95)" text-anchor="middle">MySQL</text>
    <rect x="106" y="0" width="76" height="20" rx="10" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
    <text x="144" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(96,165,250,0.95)" text-anchor="middle">TailwindCSS</text>
  </g>

  <text x="400" y="420" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">Agung Dwi Sahputra · Portfolio</text>
</svg>
