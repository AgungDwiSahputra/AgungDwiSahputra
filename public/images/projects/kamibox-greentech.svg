<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440">
  <defs>
    <linearGradient id="bg-kb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020d07"/>
      <stop offset="100%" stop-color="#071a0f"/>
    </linearGradient>
    <linearGradient id="accent-kb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="bar-kb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="glow-kb" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg-kb)"/>

  <!-- Leaf-like bg shapes -->
  <g stroke="rgba(74,222,128,0.06)" stroke-width="1" fill="none">
    <ellipse cx="80" cy="80" rx="40" ry="25" transform="rotate(-30 80 80)"/>
    <ellipse cx="720" cy="80" rx="40" ry="25" transform="rotate(30 720 80)"/>
    <ellipse cx="80" cy="360" rx="35" ry="22" transform="rotate(30 80 360)"/>
    <ellipse cx="720" cy="360" rx="35" ry="22" transform="rotate(-30 720 360)"/>
  </g>

  <ellipse cx="400" cy="210" rx="280" ry="160" fill="url(#glow-kb)"/>

  <!-- Left card: Waste Tracking -->
  <rect x="72" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(22,163,74,0.25)" stroke-width="1"/>
  <text x="146" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">LIMBAH TERSELAMATKAN</text>
  <text x="146" y="213" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800"
        fill="url(#accent-kb)" text-anchor="middle">↑ RT</text>
  <!-- Mini bar chart -->
  <rect x="88" y="228" width="16" height="22" rx="3" fill="rgba(22,163,74,0.25)"/>
  <rect x="108" y="220" width="16" height="30" rx="3" fill="rgba(22,163,74,0.38)"/>
  <rect x="128" y="212" width="16" height="38" rx="3" fill="rgba(22,163,74,0.52)"/>
  <rect x="148" y="205" width="16" height="45" rx="3" fill="url(#bar-kb)"/>
  <text x="146" y="268" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(74,222,128,0.7)" text-anchor="middle">Real-time volume data</text>

  <!-- Right card: Sustainability -->
  <rect x="580" y="145" width="148" height="145" rx="10"
        fill="rgba(255,255,255,0.03)" stroke="rgba(22,163,74,0.25)" stroke-width="1"/>
  <text x="654" y="173" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="middle">SUSTAINABILITY</text>
  <!-- Circular progress -->
  <circle cx="654" cy="215" r="30" fill="none" stroke="rgba(22,163,74,0.12)" stroke-width="6"/>
  <circle cx="654" cy="215" r="30" fill="none" stroke="url(#bar-kb)" stroke-width="6"
          stroke-dasharray="150 38" stroke-linecap="round" transform="rotate(-90 654 215)"/>
  <text x="654" y="220" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800"
        fill="url(#accent-kb)" text-anchor="middle">80%</text>
  <text x="654" y="262" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(74,222,128,0.7)" text-anchor="middle">Daur ulang efisiensi</text>

  <!-- Central card -->
  <rect x="222" y="110" width="356" height="218" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(22,163,74,0.3)" stroke-width="1"/>

  <!-- Recycling leaf icon -->
  <g transform="translate(380, 133)">
    <!-- Circular arrows -->
    <circle cx="20" cy="24" r="22" fill="rgba(22,163,74,0.2)" stroke="rgba(74,222,128,0.4)" stroke-width="1.5"/>
    <!-- Arrow 1 (top-right) -->
    <path d="M20 6 C30 6 36 14 36 24" stroke="rgba(74,222,128,0.85)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <polygon points="36,18 36,30 28,24" fill="rgba(74,222,128,0.85)"/>
    <!-- Arrow 2 (bottom-left) -->
    <path d="M20 42 C10 42 4 34 4 24" stroke="rgba(74,222,128,0.85)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <polygon points="4,30 4,18 12,24" fill="rgba(74,222,128,0.85)"/>
  </g>

  <text x="400" y="222" font-family="Inter, system-ui, sans-serif" font-size="17"
        font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle">Kamibox</text>
  <text x="400" y="245" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(74,222,128,0.82)" text-anchor="middle" letter-spacing="2">GREENTECH · WASTE MANAGEMENT · ANALYTICS</text>

  <!-- Tech badges -->
  <g transform="translate(245, 274)">
    <rect x="0" y="0" width="62" height="20" rx="10" fill="rgba(22,163,74,0.15)" stroke="rgba(22,163,74,0.35)" stroke-width="1"/>
    <text x="31" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(74,222,128,0.95)" text-anchor="middle">PHP Native</text>
    <rect x="70" y="0" width="42" height="20" rx="10" fill="rgba(22,163,74,0.15)" stroke="rgba(22,163,74,0.35)" stroke-width="1"/>
    <text x="91" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(74,222,128,0.95)" text-anchor="middle">MySQL</text>
    <rect x="120" y="0" width="76" height="20" rx="10" fill="rgba(22,163,74,0.15)" stroke="rgba(22,163,74,0.35)" stroke-width="1"/>
    <text x="158" y="14" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="600" fill="rgba(74,222,128,0.95)" text-anchor="middle">TailwindCSS</text>
  </g>

  <text x="400" y="420" font-family="Inter, system-ui, sans-serif" font-size="10"
        fill="rgba(255,255,255,0.18)" text-anchor="middle">Agung Dwi Sahputra · Portfolio</text>
</svg>
